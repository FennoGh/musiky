version: "3.9"

# ── Networks ──────────────────────────────────────────────────────
# backend: only db + api can talk to each other
# frontend: only api + web can talk to each other
# The web container has NO direct access to the database.
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────
# Named volumes persist across `docker compose down` (unlike anonymous volumes).
volumes:
  pg_data:
  uploads_data:

services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: musiky
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: musiky
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend
    # db is NOT exposed to the host — only reachable inside the backend network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musiky -d musiky"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 100M
    restart: unless-stopped

  # ── FastAPI ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://musiky:${DB_PASSWORD}@db:5432/musiky
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
    volumes:
      - uploads_data:/app/uploads
    networks:
      - backend
      - frontend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 180M
        reservations:
          memory: 100M
    restart: unless-stopped

  # ── Next.js ────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: http://${SERVER_IP}:8000
      # Cap Node.js heap to stay within the 180 MB container limit
      NODE_OPTIONS: "--max-old-space-size=160"
    networks:
      - frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 180M
        reservations:
          memory: 100M
    restart: unless-stopped
